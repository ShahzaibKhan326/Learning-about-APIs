    // ---Print Only users whose name start with  "C"---->

    async function getUsers() {
        try
        {
         let res = await fetch("https://jsonplaceholder.typicode.com/users")
         if(!res.ok) 
         {
            throw new Error("API Error")
         }
         
         let data = await res.json();
         let startWithC = data.filter(user => user.name.toLowerCase().startsWith("c"))

         if(startWithC.length === 0)
         {
            console.log("No user Found");
         }
         startWithC.forEach(user => console.log(`${user.name}-${user.email}`))
        }
        catch(error)
        {
            console.log("Error", error)
        }
    }

    getUsers()
